services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metadata
    ports:
      - 3000:3000
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HTTP_PORT=3000
    networks:
      - metadata-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'require("http").get("http://localhost:3000/ping", (r) => {if
          (r.statusCode !== 200) throw new Error(r.statusCode)})'
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  metadata-network:
    driver: bridge
